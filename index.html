<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simulateur horaires</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">Service intervention</p>
          <h1>Simulateur horaires</h1>
        </div>
        <div id="globalStatus" class="global-status" aria-live="polite"></div>
      </header>

      <section class="toolbar" aria-label="Paramètres de simulation">
        <label class="field">
          <span>Version</span>
          <select id="versionSelect">
            <option value="current">Horaire actuel</option>
            <option value="v7">10h - 7 Séries Nul</option>
            <option value="v8">10h - 8 Séries</option>
          </select>
        </label>

        <label class="field">
          <span>Nombre de séries</span>
          <input id="seriesCountInput" type="number" min="1" max="12" step="1" value="7" inputmode="numeric" />
        </label>

        <label class="field">
          <span>Dispo week-end</span>
          <select id="weekendDispoSelect">
            <option value="0">0 par jour</option>
            <option value="1">1 par jour</option>
            <option value="2">2 par jour</option>
          </select>
        </label>

        <label class="field">
          <span>Décalage séries</span>
          <select id="seriesOffsetSelect"></select>
        </label>

        <label class="field field-cycle">
          <span>Cycle</span>
          <input id="cycleInput" type="text" spellcheck="false" aria-invalid="false" />
        </label>

        <div class="toolbar-actions">
          <button id="duplicateVersion" class="secondary" type="button">Dupliquer</button>
          <button id="renameVersion" class="secondary" type="button">Renommer</button>
          <button id="deleteVersion" class="danger" type="button">Supprimer</button>
        </div>

        <div id="versionNameEditor" class="version-name-editor" hidden>
          <label class="field">
            <span>Nom de la version</span>
            <input id="versionNameInput" type="text" maxlength="40" autocomplete="off" />
          </label>
          <div class="version-name-actions">
            <button id="saveVersionName" type="button">OK</button>
            <button id="cancelVersionName" class="secondary" type="button">Annuler</button>
          </div>
        </div>
      </section>

      <section class="legend" aria-label="Pauses">
        <div class="legend-heading">
          <div>
            <h2>Pauses</h2>
          </div>
          <div id="legendActions" class="legend-actions"></div>
        </div>
        <div id="legendList" class="legend-list"></div>
        <p id="shiftSettingsStatus" class="legend-status" aria-live="polite"></p>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Visualisation</p>
            <h2 id="scheduleTitle">Horaire cyclique</h2>
          </div>
          <p id="scheduleMeta" class="meta"></p>
        </div>
        <div class="visualization-controls">
          <label class="field">
            <span>Date de départ</span>
            <input id="startDate" type="date" value="2026-01-05" />
          </label>
        </div>
        <div class="table-scroll">
          <table class="schedule-table" id="scheduleTable"></table>
        </div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Compteurs annuels</p>
            <h2>Nuits et week-ends</h2>
          </div>
          <p id="statsMeta" class="meta"></p>
        </div>
        <div class="table-scroll">
          <table class="stats-table" id="statsTable"></table>
        </div>
        <p id="statsNote" class="calculation-note"></p>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Contrôle</p>
            <h2>Règles</h2>
          </div>
          <p class="meta">PJPol et règles internes</p>
        </div>
        <div id="rulesList" class="rules-list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
